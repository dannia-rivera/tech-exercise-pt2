<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tech Exercise Part 3</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            background:#eef2f7;
            display:flex;
            justify-content:center;
            align-items:center;
            min-height:100vh;
        }

        .container{
            width:550px;
            background:white;
            padding:30px;
            border-radius:12px;
            box-shadow:0 8px 20px rgba(0,0,0,.15);
        }

        h1{
            text-align:center;
            color:#333;
            margin-bottom:25px;
        }

        form{
            display:flex;
            gap:10px;
            margin-bottom:30px;
        }

        input{
            flex:1;
            padding:12px;
            font-size:16px;
            border:1px solid #ccc;
            border-radius:6px;
        }

        button{
            padding:12px 20px;
            border:none;
            border-radius:6px;
            cursor:pointer;
            font-weight:bold;
        }

        .add-btn{
            background:#0d6efd;
            color:white;
        }

        .add-btn:hover{
            background:#0b5ed7;
        }

        h2{
            margin-bottom:15px;
            color:#333;
        }

        ul{
            list-style:none;
        }

        li{
            display:flex;
            justify-content:space-between;
            align-items:center;
            background:#f7f7f7;
            padding:12px;
            margin-bottom:12px;
            border-radius:6px;
        }

        .delete-btn{
            background:#dc3545;
            color:white;
        }

        .delete-btn:hover{
            background:#bb2d3b;
        }

        a{
            text-decoration:none;
        }

        .footer{
            margin-top:25px;
            text-align:center;
            color:gray;
            font-size:14px;
        }
    </style>

</head>

<body>

<div class="container">

    <h1>Tech Exercise 3: Flask & SQLite</h1>

    <form action="/add" method="POST">
        <input
            type="text"
            name="name"
            placeholder="Enter a name"
            required>

        <button type="submit" class="add-btn">
            Add
        </button>
    </form>

    <h2>Saved Names</h2>

    <ul>

        {% for person in people %}

        <li>

            {{ person.name }}

            <a href="/delete/{{ person.id }}">
                <button class="delete-btn">
                    Delete
                </button>
            </a>

        </li>

        {% endfor %}

    </ul>

    <div class="footer">
        Built with Flask and SQLite
    </div>

</div>

</body>
</html>
